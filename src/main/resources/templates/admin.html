<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .user-info {
            margin: 20px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        .role-badge {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            margin: 2px;
            font-size: 12px;
        }

        .btn {
            display: inline-block;
            padding: 5px 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-edit {
            background: #ffc107;
            color: black;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-logout {
            background: #6c757d;
            color: white;
        }

        .btn-profile {
            background: #17a2b8;
            color: white;
        }

        .btn-add {
            background: #28a745;
            color: white;
            padding: 8px 15px;
        }

        .inline-form {
            display: inline;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="header">
    <h2>Панель администратора - Управление пользователями</h2>
    <div class="nav-links">
        <a href="/user" class="btn btn-profile">Мой профиль</a>
        <form th:action="@{/logout}" method="post" class="inline-form">
            <button type="submit" class="btn btn-logout">Выйти</button>
        </form>
    </div>
</div>

<a th:href="@{/admin/new}" class="btn btn-add">Добавить нового пользователя</a>
<br/><br/>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Email</th>
        <th>Имя пользователя</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.firstName}">Имя</td>
        <td th:text="${user.lastName}">Фамилия</td>
        <td th:text="${user.email}">Email</td>
        <td th:text="${user.username}">Username</td>
        <td>
            <span th:each="role : ${user.roles}" class="role-badge" th:text="${role.name}">ROLE_USER</span>
        </td>
        <td class="actions">
            <a th:href="@{/admin/{id}(id=${user.id})}" class="btn btn-edit">Редактировать</a>
            <form th:action="@{/admin/{id}(id=${user.id})}" method="post" class="inline-form">
                <input type="hidden" name="_method" value="delete" />
                <button type="submit" class="btn btn-delete" onclick="return confirm('Вы уверены, что хотите удалить этого пользователя?');">Удалить</button>
            </form>
        </td>
    </tr>
    <tr th:if="${users == null or users.isEmpty()}">
        <td colspan="7" style="text-align: center;">Пользователи не найдены</td>
    </tr>
    </tbody>
</table>
</body>
</html>
