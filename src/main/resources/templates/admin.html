<!--@thymesVar id="users" type="java.util.List<ru.kata.spring.boot_security.demo.model.User>"-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            margin: 2px;
        }
        .btn-create {
            background: #4CAF50;
            color: white;
        }
        .btn-create:hover {
            background: #45a049;
        }
        .btn-edit {
            background: #2196F3;
            color: white;
        }
        .btn-edit:hover {
            background: #1976D2;
        }
        .btn-delete {
            background: #f44336;
            color: white;
        }
        .btn-delete:hover {
            background: #d32f2f;
        }
        .btn-user {
            background: #FF9800;
            color: white;
        }
        .btn-user:hover {
            background: #e68900;
        }
        .btn-logout {
            background: #555;
            color: white;
        }
        .btn-logout:hover {
            background: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .role-badge {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            margin: 2px;
        }
        .action-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .user-info span {
            font-weight: bold;
        }
        .no-users {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Admin Panel - User Management</h1>
        <div>
            <a href="/user" class="btn btn-user">My Profile</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </div>

    <!-- Информация о текущем пользователе -->
    <div class="user-info">
        <span>Welcome, <strong sec:authentication="name">User</strong>!</span>
        <span>Roles:
                <span sec:authorize="hasRole('ADMIN')" class="role-badge">ROLE_ADMIN</span>
                <span sec:authorize="hasRole('USER')" class="role-badge">ROLE_USER</span>
            </span>
    </div>

    <!-- Кнопка создания нового пользователя -->
    <a href="/admin/new" class="btn btn-create">+ Create New User</a>

    <!-- Таблица пользователей -->
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Username</th>
            <th>Roles</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}" th:if="${users != null}">
            <td th:text="${user.id}">1</td>
            <td th:text="${user.firstName}">John</td>
            <td th:text="${user.lastName}">Doe</td>
            <td th:text="${user.email}">john@example.com</td>
            <td th:text="${user.username}">johndoe</td>
            <td>
                        <span th:each="role : ${user.roles}">
                            <span class="role-badge" th:text="${role.name}">ROLE_USER</span>
                        </span>
            </td>
            <td>
                <div class="action-buttons">
                    <a th:href="@{/admin/edit/{id}(id=${user.id})}" class="btn btn-edit">Edit</a>
                    <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this user?');">
                        <button type="submit" class="btn btn-delete">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        <tr th:if="${users == null or users.isEmpty()}">
            <td colspan="7" class="no-users">No users found</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
