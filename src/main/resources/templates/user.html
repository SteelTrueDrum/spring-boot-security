<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Мой профиль</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .role-badge {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            margin: 2px;
            font-size: 12px;
        }

        .btn {
            display: inline-block;
            padding: 5px 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-logout {
            background: #6c757d;
            color: white;
        }

        .btn-admin {
            background: #28a745;
            color: white;
        }

        .inline-form {
            display: inline;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .user-info {
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="header">
    <h2>Мой профиль</h2>
    <div class="nav-links">
        <form th:action="@{/logout}" method="post" class="inline-form">
            <button type="submit" class="btn btn-logout">Выйти</button>
        </form>
    </div>
</div>

<div class="user-info">
    <h3>Информация о пользователе</h3>
    <table>
        <tr>
            <th>ID</th>
            <td th:text="${user.id}">1</td>
        </tr>
        <tr>
            <th>Имя</th>
            <td th:text="${user.firstName}">Имя</td>
        </tr>
        <tr>
            <th>Фамилия</th>
            <td th:text="${user.lastName}">Фамилия</td>
        </tr>
        <tr>
            <th>Email</th>
            <td th:text="${user.email}">Email</td>
        </tr>
        <tr>
            <th>Имя пользователя</th>
            <td th:text="${user.username}">Username</td>
        </tr>
        <tr>
            <th>Роли</th>
            <td>
                <span th:each="role : ${user.roles}" class="role-badge" th:text="${role.name}">ROLE_USER</span>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
