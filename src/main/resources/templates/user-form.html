<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 5px;
        }
        .checkbox-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-save {
            background: #4CAF50;
            color: white;
        }
        .btn-save:hover {
            background: #45a049;
        }
        .btn-cancel {
            background: #f44336;
            color: white;
        }
        .btn-cancel:hover {
            background: #d32f2f;
        }
        small {
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="${user.id} != null ? 'Edit User' : 'Create New User'">User Form</h1>

    <!-- Форма для создания - POST -->
    <form th:if="${user.id == null}"
          th:action="@{/admin/new}"
          th:object="${user}"
          method="post">

        <!-- Поля формы -->
        <div class="form-group">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" th:field="*{firstName}" required>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" th:field="*{lastName}" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" th:field="*{username}" required>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" th:field="*{password}" required>
        </div>

        <div class="form-group">
            <label>Roles:</label>
            <div class="checkbox-group">
                <div th:each="role : ${allRoles}">
                    <label>
                        <input type="checkbox"
                               th:value="${role.id}"
                               th:field="*{roles}" />
                        <span th:text="${role.name}">ROLE_USER</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-save">Create</button>
            <a href="/admin" class="btn btn-cancel">Cancel</a>
        </div>
    </form>

    <!-- Форма для редактирования - PUT с hidden методом -->
    <form th:if="${user.id != null}"
          th:action="@{/admin/{id}(id=${user.id})}"
          th:object="${user}"
          method="post">

        <!-- Скрытое поле для метода PUT -->
        <input type="hidden" name="_method" value="PUT" />

        <div class="form-group">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" th:field="*{firstName}" required>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" th:field="*{lastName}" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" th:field="*{username}" required>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" th:field="*{password}">
            <small>Leave blank to keep current password</small>
        </div>

        <div class="form-group">
            <label>Roles:</label>
            <div class="checkbox-group">
                <div th:each="role : ${allRoles}">
                    <label>
                        <input type="checkbox"
                               th:value="${role.id}"
                               th:field="*{roles}" />
                        <span th:text="${role.name}">ROLE_USER</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-save">Update</button>
            <a href="/admin" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
