<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Добро пожаловать</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        .btn-login {
            background: #007bff;
            color: white;
        }
        .btn-logout {
            background: #6c757d;
            color: white;
        }
        .btn-profile {
            background: #28a745;
            color: white;
        }
        .btn-admin {
            background: #ffc107;
            color: black;
        }
        .user-greeting {
            margin: 20px 0;
            padding: 15px;
            background: #e9ecef;
            border-radius: 5px;
        }
        .inline-form {
            display: inline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔒 Добро пожаловать!</h1>
    <p>Приложение с разграничением доступа на основе ролей</p>

    <div sec:authorize="!isAuthenticated()">
        <br/>
        <a href="/login" class="btn btn-login">Войти</a>
    </div>

</div>
</body>
</html>
